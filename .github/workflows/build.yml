# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build Go

on:
  push:
    tags:
      - 'v*'
      
jobs:
  build:
    name: Build Cross-Platform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.4']
        os: [linux, windows, darwin]
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Set binary extension for Windows
      id: vars
      run: |
        if [ "${{ matrix.os }}" = "windows" ]; then
          echo "ext=.exe" >> $GITHUB_OUTPUT
        else
          echo "ext=" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Build binary
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        go build -v -ldflags="-s -w -X main.Version=$(git describe --tags)" -trimpath -o build/lolscan-${{ matrix.os }}-${{ matrix.arch }}${{ steps.vars.outputs.ext }} .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lolscan-${{ matrix.os }}-${{ matrix.arch }}
        path: build/lolscan-${{ matrix.os }}-${{ matrix.arch }}${{ steps.vars.outputs.ext }}
